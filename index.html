<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Image to PDF Maker</title>
    
    <!-- Fonts: Montserrat & Open Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS for Modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #F8FAFC; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .sortable-ghost { opacity: 0.4; border: 2px dashed #4F46E5; }
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .image-card:hover .delete-btn { display: flex; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <i data-lucide="file-type-2" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800">PDF <span class="text-indigo-600">Maker</span></h1>
            </div>
            <button onclick="clearAll()" class="text-sm font-medium text-red-500 hover:text-red-700 flex items-center gap-1">
                <i data-lucide="trash-2" class="w-4 h-4"></i> Clear All
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        
        <!-- Upload Zone -->
        <div id="dropZone" class="border-2 border-dashed border-indigo-300 rounded-2xl p-8 text-center bg-indigo-50 hover:bg-indigo-100 transition-all cursor-pointer mb-8" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="handleFiles(this.files)">
            <div class="flex flex-col items-center">
                <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mb-4 custom-shadow">
                    <i data-lucide="image" class="text-indigo-600 w-8 h-8"></i>
                </div>
                <h3 class="text-lg font-semibold text-gray-700">Select or Drag Images</h3>
                <p class="text-gray-500 text-sm">PNG, JPG, WEBP (Upto 20 images)</p>
            </div>
        </div>

        <!-- Preview Grid (Sortable) -->
        <div id="previewGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <!-- Images will appear here -->
        </div>

        <!-- Settings Section -->
        <div class="bg-white rounded-2xl p-6 custom-shadow mb-8 border border-gray-100">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <i data-lucide="settings" class="w-5 h-5 text-indigo-600"></i> PDF Settings
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Page Size -->
                <div>
                    <label class="text-sm font-semibold text-gray-600">Page Size</label>
                    <select id="pageSize" class="w-full mt-2 p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="a4">A4 (Standard)</option>
                        <option value="letter">US Letter</option>
                        <option value="fit">Fit Image Size</option>
                    </select>
                </div>

                <!-- Margin -->
                <div>
                    <label class="text-sm font-semibold text-gray-600">Margin</label>
                    <select id="margin" class="w-full mt-2 p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="0">No Margin</option>
                        <option value="10">Small (10px)</option>
                        <option value="20">Large (20px)</option>
                    </select>
                </div>

                <!-- Quality -->
                <div>
                    <label class="text-sm font-semibold text-gray-600">Image Quality</label>
                    <select id="quality" class="w-full mt-2 p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="1.0">Original (High)</option>
                        <option value="0.7">Medium (Compressed)</option>
                        <option value="0.4">Low (Small Size)</option>
                    </select>
                </div>
            </div>

            <!-- Advanced Features -->
            <div class="mt-6 pt-6 border-t grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-sm font-semibold text-gray-600">Watermark Text</label>
                    <input type="text" id="watermark" placeholder="Confidential, Your Name etc." class="w-full mt-2 p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-600">PDF Password (Optional)</label>
                    <input type="password" id="pdfPassword" placeholder="Set password to open" class="w-full mt-2 p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>
        </div>

    </main>

    <!-- Bottom Action Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-center z-50">
        <button onclick="generatePDF()" id="generateBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-indigo-200 transition-all active:scale-95 disabled:bg-gray-400">
            <i data-lucide="file-down" class="w-5 h-5"></i> Convert to PDF
        </button>
    </div>

    <!-- Processing Modal -->
    <div id="loader" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl text-center shadow-2xl">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mx-auto mb-4"></div>
            <p class="font-bold text-gray-800">Creating your PDF...</p>
            <p class="text-sm text-gray-500">Please wait a moment.</p>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        let imageFiles = [];
        const previewGrid = document.getElementById('previewGrid');
        
        // Initialize Sortable
        new Sortable(previewGrid, {
            animation: 150,
            ghostClass: 'sortable-ghost'
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        addImageToGrid(e.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function addImageToGrid(src) {
            const div = document.createElement('div');
            div.className = 'image-card relative aspect-[3/4] rounded-xl overflow-hidden bg-gray-200 group custom-shadow';
            div.innerHTML = `
                <img src="${src}" class="w-full h-full object-cover">
                <button onclick="this.parentElement.remove()" class="delete-btn absolute top-2 right-2 bg-red-500 text-white p-1.5 rounded-full hidden hover:bg-red-600 shadow-lg">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            `;
            previewGrid.appendChild(div);
            lucide.createIcons();
        }

        function clearAll() {
            previewGrid.innerHTML = '';
        }

        async function generatePDF() {
            const images = previewGrid.querySelectorAll('img');
            if (images.length === 0) {
                alert('Please upload some images first!');
                return;
            }

            const loader = document.getElementById('loader');
            const btn = document.getElementById('generateBtn');
            loader.style.display = 'flex';
            btn.disabled = true;

            const { jsPDF } = window.jspdf;
            
            // Get Settings
            const size = document.getElementById('pageSize').value;
            const margin = parseInt(document.getElementById('margin').value);
            const quality = parseFloat(document.getElementById('quality').value);
            const watermarkText = document.getElementById('watermark').value;
            
            let pdf;
            if (size === 'fit') {
                pdf = new jsPDF('p', 'px');
            } else {
                pdf = new jsPDF('p', 'mm', size);
            }

            for (let i = 0; i < images.length; i++) {
                const img = images[i];
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // Compression logic using Canvas
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                ctx.drawImage(img, 0, 0);
                const imgData = canvas.toDataURL('image/jpeg', quality);

                const imgProps = pdf.getImageProperties(imgData);
                
                let pdfWidth, pdfHeight;

                if (size === 'fit') {
                    pdfWidth = imgProps.width;
                    pdfHeight = imgProps.height;
                    if (i > 0) pdf.addPage([pdfWidth, pdfHeight], pdfHeight > pdfWidth ? 'p' : 'l');
                    else pdf.setPage(1); // Set first page size
                } else {
                    pdfWidth = pdf.internal.pageSize.getWidth();
                    pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                    if (i > 0) pdf.addPage();
                }

                // Add Image with Margin
                pdf.addImage(imgData, 'JPEG', margin, margin, pdfWidth - (margin * 2), pdfHeight - (margin * 2));

                // Add Watermark
                if (watermarkText) {
                    pdf.setTextColor(150);
                    pdf.setFontSize(30);
                    pdf.setGState(new pdf.GState({opacity: 0.3}));
                    pdf.text(watermarkText, pdfWidth/2, pdfHeight/2, { align: 'center', angle: 45 });
                    pdf.setGState(new pdf.GState({opacity: 1}));
                }
            }

            // Save PDF
            pdf.save('Generated_By_PDFMaker.pdf');
            
            loader.style.display = 'none';
            btn.disabled = false;
        }

        // Drag & Drop event listeners
        const dropZone = document.getElementById('dropZone');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        dropZone.addEventListener('drop', (e) => {
            handleFiles(e.dataTransfer.files);
        });
    </script>
</body>
</html>
